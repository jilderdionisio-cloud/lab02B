<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mi Catálogo de Películas{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        .sitio-web {
            min-height: 100vh; /* Ocupa el 100% de la altura de la pantalla */
            display: flex;
            flex-direction: column;
        }
        .contenido-principal {
            flex: 1; /* Este elemento se estira para empujar el footer al fondo */
        }
    </style>
</head>
<body class="bg-light sitio-web"> <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🎬 CineNaomi</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="/">Inicio</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="contenido-principal">
        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3">
        <div class="container">
            <small>&copy; 2026 CineNaomi - Todos los derechos reservados.</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
